services:
  - type: web
    name: killer-boss-game
    runtime: python
    repo: https://github.com/mitanguse/killer-boss-game
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
